<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="toolbar">
    <button id="clear-btn" title="Clear">Clear</button>
    <div id="type-filters">
      <button class="type-btn active" data-type="all">All</button>
      <button class="type-btn" data-type="api">API</button>
      <button class="type-btn" data-type="doc">Doc</button>
      <button class="type-btn" data-type="js">JS</button>
      <button class="type-btn" data-type="css">CSS</button>
      <button class="type-btn" data-type="img">Img</button>
      <button class="type-btn" data-type="other">Other</button>
    </div>
    <span id="count">0 requests</span>
  </div>
  <div id="filter-bar">
    <button id="settings-btn" title="Recording Settings">&#9881;</button>
    <input id="filter-input" type="text" placeholder="Filter URLs...">
  </div>
  <div id="request-list"></div>

  <div id="context-menu" class="context-menu hidden">
    <div class="menu-item has-submenu">
      T2C
      <span class="arrow">&#9654;</span>
      <div class="submenu">
        <div class="submenu-item" data-mode="minimal">
          <span class="label">Minimal</span>
          <span class="desc">method, url, body, response</span>
        </div>
        <div class="submenu-item" data-mode="normal">
          <span class="label">Normal</span>
          <span class="desc">+ headers (cookie summarized)</span>
        </div>
        <div class="submenu-item" data-mode="full">
          <span class="label">Full</span>
          <span class="desc">everything, no omission</span>
        </div>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>Recording Settings</span>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <div class="setting-title">HTTP Methods</div>
          <div class="setting-hint">체크 해제 시 해당 메서드는 녹화하지 않음</div>
          <div class="checkbox-group" id="method-checks">
            <label><input type="checkbox" value="GET" checked> GET</label>
            <label><input type="checkbox" value="POST" checked> POST</label>
            <label><input type="checkbox" value="PUT" checked> PUT</label>
            <label><input type="checkbox" value="PATCH" checked> PATCH</label>
            <label><input type="checkbox" value="DELETE" checked> DELETE</label>
            <label><input type="checkbox" value="OPTIONS" checked> OPTIONS</label>
            <label><input type="checkbox" value="HEAD" checked> HEAD</label>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-title">Resource Types</div>
          <div class="setting-hint">체크 해제 시 해당 타입은 목록에 추가하지 않음</div>
          <div class="checkbox-group" id="type-checks">
            <label><input type="checkbox" value="api" checked> API</label>
            <label><input type="checkbox" value="doc" checked> Doc</label>
            <label><input type="checkbox" value="js" checked> JS</label>
            <label><input type="checkbox" value="css" checked> CSS</label>
            <label><input type="checkbox" value="img" checked> Img</label>
            <label><input type="checkbox" value="other" checked> Other</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="panel.js"></script>
</body>
</html>
